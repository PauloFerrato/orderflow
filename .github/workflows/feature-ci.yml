name: Feature Branch CI

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-test-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build e testes
        run: mvn -f app/pom.xml clean test

      - name: Criar PR via GitHub CLI
        run: |
          gh pr create \
            --base develop \
            --head ${{ github.ref_name }} \
            --title "Auto PR: ${{ github.ref_name }} -> develop" \
            --body "PR criado automaticamente."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}